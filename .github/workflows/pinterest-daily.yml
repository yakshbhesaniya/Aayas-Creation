name: Pinterest auto-pin

# Runs every day at 09:00 UTC (~2:30 PM IST). Free on GitHub Actions.
# You can also trigger it manually from the Actions tab (workflow_dispatch).
on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Set to 1 to preview pins without posting"
        required: false
        default: "0"

# Needed so the workflow can commit the updated state.json back to the repo.
permissions:
  contents: write

concurrency:
  group: pinterest-auto-pin
  cancel-in-progress: false

jobs:
  pin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Post pins
        env:
          PINTEREST_APP_ID: ${{ secrets.PINTEREST_APP_ID }}
          PINTEREST_APP_SECRET: ${{ secrets.PINTEREST_APP_SECRET }}
          PINTEREST_REFRESH_TOKEN: ${{ secrets.PINTEREST_REFRESH_TOKEN }}
          PINTEREST_BOARD_IDS: ${{ secrets.PINTEREST_BOARD_IDS }}
          PINS_PER_RUN: "4"
          DRY_RUN: ${{ github.event.inputs.dry_run || '0' }}
        run: node scripts/pinterest/postPins.mjs

      - name: Save posting state
        if: ${{ github.event.inputs.dry_run != '1' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/pinterest/state.json
          git diff --staged --quiet || git commit -m "chore: update pinterest state [skip ci]"
          git push
